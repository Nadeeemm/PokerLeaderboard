<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Poker Night Leaderboard</title>
</head>

<body>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:wght@300;400;500;600&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --felt: #0a2e1a;
      --felt2: #0d3820;
      --gold: #c9973a;
      --gold2: #e8b84b;
      --gold3: #f5d07a;
      --red: #8b1a1a;
      --red2: #c0392b;
      --chip-w: #e8e0c8;
      --chip-b: #1a1a2e;
      --card: #faf8f0;
      --border: rgba(201, 151, 58, 0.4);
      --win: #27ae60;
      --loss: #c0392b;
    }

    body {
      background: transparent;
      font-family: 'Crimson Pro', serif;
      color: var(--chip-w);
      perspective: 1000px;
      overflow-x: hidden;
    }

    .app {
      background: radial-gradient(ellipse at 50% 30%, #0f3d22 0%, #061a0f 100%);
      min-height: 100vh;
      padding: 0 0 2rem;
      position: relative;
      overflow-x: hidden;
      perspective: 1200px;
    }

    .app::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(201, 151, 58, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(192, 57, 43, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .felt-pattern {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.012) 0px, rgba(255, 255, 255, 0.012) 1px, transparent 1px, transparent 8px),
        repeating-linear-gradient(-45deg, rgba(255, 255, 255, 0.012) 0px, rgba(255, 255, 255, 0.012) 1px, transparent 1px, transparent 8px);
      z-index: 0;
    }

    /* Sparkles */
    .sparkle {
      position: fixed;
      pointer-events: none;
      font-size: 20px;
      animation: sparkleAnim 1s ease-out forwards;
      z-index: 50;
    }

    @keyframes sparkleAnim {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(0);
      }
    }

    .content {
      position: relative;
      z-index: 1;
    }

    /* 3D Perspective Container */
    .content {
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    .header {
      text-align: center;
      padding: 2rem 1rem 1.5rem;
      border-bottom: 3px solid var(--gold);
      margin-bottom: 1.5rem;
      background: linear-gradient(180deg, rgba(201, 151, 58, 0.2) 0%, rgba(201, 151, 58, 0.05) 100%);
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 200%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(245, 208, 122, 0.4), transparent);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0% {
        left: -100%;
      }

      100% {
        left: 100%;
      }
    }

    .header h1 {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(18px, 4vw, 32px);
      color: var(--gold2);
      letter-spacing: 3px;
      text-shadow: 0 0 30px rgba(232, 184, 75, 0.8), 0 0 60px rgba(201, 151, 58, 0.4);
      line-height: 1.2;
      animation: titleGlow 2.5s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }

    @keyframes titleGlow {

      0%,
      100% {
        text-shadow: 0 0 30px rgba(232, 184, 75, 0.8), 0 0 60px rgba(201, 151, 58, 0.4);
      }

      50% {
        text-shadow: 0 0 40px rgba(232, 184, 75, 1), 0 0 80px rgba(201, 151, 58, 0.6);
      }
    }

    .suit-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 8px;
      font-size: 22px;
      opacity: 1;
      position: relative;
      z-index: 1;
    }

    .suit-row span {
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(201, 151, 58, 0.8));
    }

    .suit-row span:nth-child(1) {
      animation-delay: 0s;
    }

    .suit-row span:nth-child(2) {
      animation-delay: 0.6s;
    }

    .suit-row span:nth-child(3) {
      animation-delay: 1.2s;
    }

    .suit-row span:nth-child(4) {
      animation-delay: 1.8s;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) rotateZ(0deg) scale(1);
        opacity: 0.9;
      }

      50% {
        transform: translateY(-12px) rotateZ(5deg) scale(1.15);
        opacity: 1;
      }
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 2px;
      margin: 0 1rem 1.5rem;
      border: 3px solid var(--gold);
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.4));
      box-shadow: 0 8px 30px rgba(201, 151, 58, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      padding: 4px;
    }

    .tab {
      flex: 1;
      padding: 12px 8px;
      text-align: center;
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(9px, 2vw, 12px);
      cursor: pointer;
      border: none;
      background: transparent;
      color: rgba(201, 151, 58, 0.6);
      letter-spacing: 1px;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      font-weight: 600;
      border-radius: 10px;
      overflow: hidden;
    }

    .tab::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(201, 151, 58, 0.1);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .tab:hover:not(.active) {
      background: rgba(201, 151, 58, 0.15);
      color: var(--gold2);
      transform: translateY(-2px);
    }

    .tab.active {
      background: linear-gradient(135deg, rgba(201, 151, 58, 0.5), rgba(201, 151, 58, 0.3));
      color: var(--gold3);
      box-shadow: 0 4px 15px rgba(201, 151, 58, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      text-shadow: 0 0 10px rgba(245, 208, 122, 0.5);
      transform: translateZ(0) scale(1.02);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold3), transparent);
    }

    /* Panel */
    .panel {
      display: none;
      padding: 0 5rem;
    }

    .panel.active {
      display: block;
    }

    /* Section title */
    .section-title {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0.9;
      text-shadow: 0 0 10px rgba(201, 151, 58, 0.3);
      margin-left: 1rem;
    }

    /* Form card */
    .form-card {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.5));
      border: 3px solid var(--gold);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 12px 40px rgba(201, 151, 58, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15), 0 0 30px rgba(201, 151, 58, 0.1);
      animation: cardFloat 3.5s ease-in-out infinite;
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    .form-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 50%, rgba(201, 151, 58, 0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    @keyframes cardFloat {

      0%,
      100% {
        transform: translateZ(0) translateY(0);
        box-shadow: 0 12px 40px rgba(201, 151, 58, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15), 0 0 30px rgba(201, 151, 58, 0.1);
      }

      50% {
        transform: translateZ(10px) translateY(-6px);
        box-shadow: 0 20px 60px rgba(201, 151, 58, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 0 50px rgba(201, 151, 58, 0.2);
      }
    }

    .form-card:hover {
      box-shadow: 0 20px 60px rgba(201, 151, 58, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 0 50px rgba(201, 151, 58, 0.2);
    }

    .form-card input,
    .form-card select {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(201, 151, 58, 0.35);
      border-radius: 6px;
      color: var(--chip-w);
      padding: 8px 10px;
      font-family: 'Crimson Pro', serif;
      font-size: 15px;
      width: 100%;
      outline: none;
      transition: border 0.2s;
    }

    .form-card input:focus {
      border-color: var(--gold2);
    }

    .form-card input::placeholder {
      color: rgba(232, 224, 200, 0.4);
    }

    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .form-row .field {
      flex: 1;
    }

    .form-row .field label {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 1px;
      display: block;
      margin-bottom: 4px;
      opacity: 0.8;
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
      color: #1a0a00;
      font-family: 'Cinzel Decorative', cursive;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(201, 151, 58, 0.3);
    }

    .btn-gold::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: btnShine 2s infinite;
    }

    @keyframes btnShine {
      0% {
        left: -100%;
      }

      100% {
        left: 100%;
      }
    }

    .btn-gold:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 6px 25px rgba(201, 151, 58, 0.5);
    }

    .btn-gold:active {
      transform: translateY(-1px) scale(0.98);
    }

    .btn-sm {
      background: transparent;
      color: rgba(232, 224, 200, 0.5);
      border: 1px solid rgba(232, 224, 200, 0.2);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-sm:hover {
      color: var(--loss);
      border-color: var(--loss);
    }

    /* Player chips row */
    .players-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 1rem;
    }

    .player-chip {
      background: linear-gradient(135deg, rgba(201, 151, 58, 0.2), rgba(201, 151, 58, 0.08));
      border: 2px solid var(--gold);
      border-radius: 25px;
      padding: 6px 14px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--chip-w);
      animation: chipIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 10px rgba(201, 151, 58, 0.2);
      transition: all 0.3s ease;
    }

    .player-chip:hover {
      background: linear-gradient(135deg, rgba(201, 151, 58, 0.3), rgba(201, 151, 58, 0.15));
      box-shadow: 0 4px 15px rgba(201, 151, 58, 0.4);
      transform: scale(1.05);
    }

    @keyframes chipIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .player-chip .remove {
      cursor: pointer;
      color: rgba(232, 224, 200, 0.4);
      font-size: 12px;
      transition: color 0.2s;
    }

    .player-chip .remove:hover {
      color: var(--loss);
    }

    /* Leaderboard table */
    .lb-table {
      width: 100%;
      border-collapse: collapse;
    }

    .lb-table th {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--gold);
      opacity: 0.7;
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
    }

    .lb-table td {
      padding: 10px 8px;
      font-size: 14px;
      border-bottom: 1px solid rgba(201, 151, 58, 0.08);
      vertical-align: middle;
    }

    .lb-row {
      transition: all 0.3s ease;
    }

    .lb-row:hover {
      background: rgba(201, 151, 58, 0.12);
      transform: translateX(4px);
      box-shadow: inset 0 0 15px rgba(201, 151, 58, 0.1);
    }

    .rank-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel Decorative', cursive;
      font-size: 11px;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      animation: badgeGlow 2s ease-in-out infinite;
    }

    @keyframes badgeGlow {

      0%,
      100% {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      }

      50% {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
      }
    }

    .rank-1 {
      background: linear-gradient(135deg, #c9973a, #f5d07a);
      color: #1a0a00;
      box-shadow: 0 0 15px rgba(245, 208, 122, 0.6);
    }

    .rank-2 {
      background: linear-gradient(135deg, #8a8a8a, #d0d0d0);
      color: #1a1a1a;
      box-shadow: 0 0 10px rgba(208, 208, 208, 0.4);
    }

    .rank-3 {
      background: linear-gradient(135deg, #8b5a2b, #cd853f);
      color: #fff3e0;
      box-shadow: 0 0 10px rgba(205, 133, 63, 0.4);
    }

    .rank-other {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(232, 224, 200, 0.6);
    }

    .player-name {
      font-size: 15px;
      font-weight: 500;
      text-shadow: 0 0 8px rgba(232, 224, 200, 0.2);
    }

    .net-pos {
      color: #2ecc71;
      font-weight: 600;
      text-shadow: 0 0 8px rgba(46, 204, 113, 0.3);
    }

    .net-neg {
      color: var(--loss);
      font-weight: 600;
      text-shadow: 0 0 8px rgba(192, 57, 43, 0.3);
    }

    .net-zero {
      color: rgba(232, 224, 200, 0.5);
    }

    .wl-bar {
      display: flex;
      gap: 4px;
      align-items: center;
      font-size: 12px;
    }

    .wins {
      color: #2ecc71;
    }

    .losses {
      color: var(--loss);
    }

    /* Game history cards */
    .game-card {
      background: linear-gradient(135deg, rgba(10, 46, 26, 0.9), rgba(13, 56, 32, 0.7));
      border: 3px solid var(--gold);
      border-radius: 16px;
      padding: 1.2rem;
      margin-bottom: 12px;
      animation: slideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 30px rgba(201, 151, 58, 0.2), 0 0 20px rgba(201, 151, 58, 0.1);
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
    }

    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 50%, rgba(201, 151, 58, 0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .game-card:hover {
      transform: perspective(1000px) rotateX(-5deg) translateZ(10px) translateY(-6px);
      box-shadow: 0 15px 50px rgba(201, 151, 58, 0.35), 0 0 40px rgba(245, 208, 122, 0.15);
      border-color: var(--gold2);
    }

    @keyframes slideIn {
      from {
        transform: perspective(1000px) translateX(-20px) rotateY(10deg);
        opacity: 0;
      }

      to {
        transform: perspective(1000px) translateX(0) rotateY(0);
        opacity: 1;
      }
    }

    .game-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(201, 151, 58, 0.15);
    }

    .game-name {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 12px;
      color: var(--gold2);
    }

    .game-date {
      font-size: 11px;
      color: rgba(232, 224, 200, 0.4);
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 13px;
    }

    .crown {
      font-size: 10px;
      margin-left: 4px;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: rgba(232, 224, 200, 0.35);
      font-size: 14px;
    }

    .empty .card-icon {
      font-size: 36px;
      margin-bottom: 10px;
      opacity: 0.4;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .stat-box {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 8px;
      text-align: center;
    }

    .stat-val {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(14px, 3vw, 18px);
      color: var(--gold2);
      display: block;
    }

    .stat-label {
      font-size: 10px;
      color: rgba(232, 224, 200, 0.5);
      letter-spacing: 0.5px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
      color: #1a0a00;
      font-family: 'Cinzel Decorative', cursive;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 12px 24px;
      border-radius: 25px;
      box-shadow: 0 6px 25px rgba(201, 151, 58, 0.4), 0 0 20px rgba(245, 208, 122, 0.3);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 100;
      white-space: nowrap;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .toast.show {
      opacity: 1;
      animation: toastBounce 0.6s ease;
    }

    @keyframes toastBounce {
      0% {
        transform: translateX(-50%) translateY(20px);
        opacity: 0;
      }

      50% {
        transform: translateX(-50%) translateY(-5px);
      }

      100% {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }

    /* Toggle for per-game selector */
    .game-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .game-pill {
      background: linear-gradient(135deg, rgba(201, 151, 58, 0.15), rgba(201, 151, 58, 0.05));
      border: 2px solid rgba(201, 151, 58, 0.4);
      border-radius: 25px;
      padding: 6px 14px;
      font-size: 12px;
      color: rgba(232, 224, 200, 0.7);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .game-pill.active {
      background: linear-gradient(135deg, rgba(201, 151, 58, 0.4), rgba(201, 151, 58, 0.2));
      border-color: var(--gold2);
      color: var(--gold2);
      box-shadow: 0 0 15px rgba(201, 151, 58, 0.3);
      transform: scale(1.05);
    }

    .game-pill:hover:not(.active) {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201, 151, 58, 0.2);
      transform: translateY(-2px);
    }

    /* Add player inline */
    .add-player-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .add-player-row input {
      flex: 1;
    }

    .btn-add {
      background: rgba(201, 151, 58, 0.2);
      border: 1px solid var(--border);
      color: var(--gold2);
      font-size: 16px;
      border-radius: 6px;
      padding: 0 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-add:hover {
      background: rgba(201, 151, 58, 0.35);
    }

    /* Auth Modal */
    .auth-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .auth-overlay.active {
      display: flex;
    }

    .auth-modal {
      background: linear-gradient(135deg, rgba(10, 46, 26, 0.95), rgba(13, 56, 32, 0.95));
      border: 2px solid var(--gold);
      border-radius: 12px;
      padding: 2rem;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), 0 0 20px rgba(201, 151, 58, 0.2);
    }

    .auth-modal h2 {
      font-family: 'Cinzel Decorative', cursive;
      color: var(--gold2);
      font-size: 18px;
      margin-bottom: 1rem;
      text-align: center;
      letter-spacing: 1px;
    }

    .auth-modal p {
      color: rgba(232, 224, 200, 0.6);
      font-size: 12px;
      margin-bottom: 1.2rem;
      text-align: center;
    }

    .auth-input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--chip-w);
      font-size: 16px;
      margin-bottom: 1rem;
      font-family: 'Crimson Pro', serif;
      letter-spacing: 2px;
      text-align: center;
    }

    .auth-input:focus {
      outline: none;
      border-color: var(--gold2);
      box-shadow: 0 0 10px rgba(201, 151, 58, 0.2);
    }

    .auth-buttons {
      display: flex;
      gap: 10px;
    }

    .auth-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-family: 'Cinzel Decorative', cursive;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-confirm {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
      color: #1a0a00;
      font-weight: 700;
    }

    .btn-confirm:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(201, 151, 58, 0.4);
    }

    .btn-cancel {
      background: rgba(201, 151, 58, 0.15);
      color: var(--gold);
      border: 1px solid var(--gold);
    }

    .btn-cancel:hover {
      background: rgba(201, 151, 58, 0.25);
    }

    .auth-error {
      color: var(--loss);
      font-size: 11px;
      margin-bottom: 1rem;
      text-align: center;
    }

    /* Lock icon on tab */
    .tab.locked::after {
      content: '🔒';
      margin-left: 4px;
      font-size: 10px;
    }

    /* Users List */
    .users-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin: 0 1rem;
    }

    .user-card {
      background: linear-gradient(135deg, rgba(10, 46, 26, 0.9), rgba(13, 56, 32, 0.9));
      border: 2px solid var(--gold);
      border-radius: 16px;
      padding: 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(201, 151, 58, 0.2), 0 0 20px rgba(201, 151, 58, 0.1);
      animation: cardSlideIn 0.6s ease;
      transform-style: preserve-3d;
      transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
      backface-visibility: hidden;
    }

    @keyframes cardSlideIn {
      from {
        opacity: 0;
        transform: perspective(1200px) translateZ(-50px) translateY(30px);
      }

      to {
        opacity: 1;
        transform: perspective(1200px) translateZ(0) translateY(0);
      }
    }

    .user-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(201, 151, 58, 0.3) 0%, transparent 70%);
      animation: userCardGlow 4s ease-in-out infinite;
    }

    @keyframes userCardGlow {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
        opacity: 0.5;
      }

      50% {
        transform: translate(30px, 30px) scale(1.1);
        opacity: 0.8;
      }
    }

    .user-card:hover {
      transform: perspective(1000px) rotateX(-8deg) rotateY(8deg) translateZ(20px) scale(1.08);
      box-shadow: 0 20px 50px rgba(201, 151, 58, 0.4), 0 0 40px rgba(245, 208, 122, 0.2), inset 0 0 30px rgba(201, 151, 58, 0.15);
      border-color: var(--gold2);
    }

    .user-card:active {
      transform: perspective(1000px) rotateX(-4deg) rotateY(4deg) translateZ(15px) scale(1.05);
    }

    .user-card-name {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 16px;
      color: var(--gold2);
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(232, 184, 75, 0.3);
      position: relative;
      z-index: 1;
    }

    .user-card-stats {
      font-size: 12px;
      color: rgba(232, 224, 200, 0.7);
      line-height: 1.8;
      position: relative;
      z-index: 1;
    }

    .user-card-stat-label {
      color: rgba(232, 224, 200, 0.5);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .user-card-stat-value {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 18px;
      font-weight: bold;
      margin-top: 4px;
    }

    .user-card.winner .user-card-stat-value {
      color: #2ecc71;
      text-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
    }

    .user-card.loser .user-card-stat-value {
      color: #e74c3c;
      text-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
    }

    .user-chip-icon {
      font-size: 28px;
      margin-bottom: 8px;
      animation: chipSpin 3s linear infinite;
    }

    @keyframes chipSpin {
      0% {
        transform: rotateY(0deg);
      }

      100% {
        transform: rotateY(360deg);
      }
    }

    /* User Detail Modal */
    .user-detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 300;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      animation: overlayFadeIn 0.3s ease;
    }

    @keyframes overlayFadeIn {
      from {
        backdrop-filter: blur(0px);
        opacity: 0;
      }

      to {
        backdrop-filter: blur(8px);
        opacity: 1;
      }
    }

    .user-detail-overlay.active {
      display: flex;
    }

    .user-detail-modal {
      background: linear-gradient(135deg, rgba(10, 46, 26, 0.98), rgba(13, 56, 32, 0.98));
      border: 3px solid var(--gold);
      border-radius: 20px;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(201, 151, 58, 0.4), 0 0 40px rgba(245, 208, 122, 0.2);
      animation: modalPopIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
      transform: perspective(1200px);
      max-height: 80vh;
      overflow-y: auto;
    }

    @keyframes modalPopIn {
      0% {
        opacity: 0;
        transform: perspective(1200px) scale(0.5) rotateX(20deg);
      }

      100% {
        opacity: 1;
        transform: perspective(1200px) scale(1) rotateX(0deg);
      }
    }

    .user-detail-modal::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(201, 151, 58, 0.2) 0%, transparent 60%);
      pointer-events: none;
    }

    .user-detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid var(--gold);
      position: relative;
      z-index: 1;
    }

    .user-detail-name {
      font-family: 'Cinzel Decorative', cursive;
      font-size: 24px;
      color: var(--gold2);
      text-shadow: 0 0 15px rgba(232, 184, 75, 0.4);
    }

    .user-detail-close {
      background: rgba(201, 151, 58, 0.2);
      border: 2px solid var(--gold);
      color: var(--gold2);
      font-size: 24px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .user-detail-close:hover {
      background: var(--gold);
      color: #1a0a00;
      transform: rotate(90deg) scale(1.1);
    }

    .user-detail-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 1;
    }

    .detail-stat-box {
      background: linear-gradient(135deg, rgba(201, 151, 58, 0.15), rgba(201, 151, 58, 0.05));
      border: 2px solid var(--gold);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .detail-stat-box:hover {
      background: linear-gradient(135deg, rgba(201, 151, 58, 0.25), rgba(201, 151, 58, 0.1));
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(201, 151, 58, 0.2);
    }

    .detail-stat-label {
      font-size: 11px;
      color: rgba(232, 224, 200, 0.6);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .detail-stat-value {
      font-family: 'Cinzel Decorative', cursive;

      font-weight: bold;
      color: var(--gold2);

    .user-detail-games {

    .game-item {

      font-size: 12px;
    }

    .game-item-result {

    async function loadState() {
      try {
        const players = embeddedData.players || [];
        const games = embeddedData.games || [];
        
        state = { players, games, selectedGame: null };
        const selectedDate = localStorage.getItem('selectedGameDate');

        // Restore selection by date
        if (selectedDate) {
          const match = state.games.find(g => g.date === selectedDate);
          state.selectedGame = match ? match.id : state.games.at(-1)?.id || null;
        } else {
          state.selectedGame = state.games.at(-1)?.id || null;
        }

        console.log('State loaded:', state);
      } catch (e) {
        console.error('Error loading state:', e);
        state = { players: [], games: [], selectedGame: null };
      }

      init();
    }


    async function saveState() {
      try {
        // Save to localStorage for client-side tracking
        const selectedGame = state.games.find(g => g.id === state.selectedGame);
        if (selectedGame) {
          localStorage.setItem('selectedGameDate', selectedGame.date);
        }
        localStorage.setItem('poker_state_backup', JSON.stringify(state));

        // Log to console for monitoring
        console.log('Current state updated');
        console.log('Total games:', state.games.length);
        console.log('Players:', state.players.length);

        showToast('Progress saved!');
      } catch (e) {
        console.error('Error saving state:', e);
      }
    }

    async function saveGameFile(game) {
      try {
        // Generate game file name based on game index
        const gameIndex = state.games.findIndex(g => g.id === game.id) + 1;
        const gameFileName = `game-${gameIndex}.json`;
        
        // Log the game data that should be saved
        console.log(`Game file to save (${gameFileName}):`, JSON.stringify(game, null, 2));
        
        // For demonstration, also download the game file
        const dataStr = JSON.stringify(game, null, 2);
        const dataBlob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(dataBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = gameFileName;
        link.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        console.error('Error saving game file:', e);
      }
    }

    function downloadDataAsJSON() {
      // Export all data as a complete backup
      const allData = {
        players: state.players,
        games: state.games,
        exportDate: new Date().toISOString()
      };
      const dataStr = JSON.stringify(allData, null, 2);
      const dataBlob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(dataBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `poker_backup_${new Date().toISOString().slice(0, 10)}.json`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function requireAuth(action, reason = 'Admin access required') {
      if (isAuthenticated) {
        executeAuthAction(action);
      } else {
        authPendingAction = action;
        showAuthModal(reason);
      }
    }

    function showAuthModal(reason) {
      document.getElementById('auth-reason').textContent = reason;
      document.getElementById('auth-error').textContent = '';
      document.getElementById('auth-code').value = '';
      document.getElementById('auth-overlay').classList.add('active');
      setTimeout(() => document.getElementById('auth-code').focus(), 100);
    }

    function confirmAuth() {
      const code = document.getElementById('auth-code').value;
      const errorEl = document.getElementById('auth-error');

      if (code === SECRET_CODE) {
        isAuthenticated = true;
        document.getElementById('auth-overlay').classList.remove('active');
        if (authPendingAction) {
          executeAuthAction(authPendingAction);
          authPendingAction = null;
        }
        showToast('Access granted!');
        // Auto-logout after 30 minutes
        setTimeout(() => { isAuthenticated = false; showToast('Session expired.'); }, 30 * 60 * 1000);
      } else {
        errorEl.textContent = '❌ Wrong code. Try again.';
        document.getElementById('auth-code').value = '';
      }
    }

    function cancelAuth() {
      document.getElementById('auth-overlay').classList.remove('active');
      authPendingAction = null;
    }

    function executeAuthAction(action) {
      if (action === 'add-player') addPlayer();
      else if (action.startsWith('remove-player-')) {
        const id = action.split('-')[2];
        removePlayer(id);
      }
      else if (action === 'add-game') saveGame();
    }

    function init() {
      const di = document.getElementById('game-date-input');
      if (di) di.value = new Date().toISOString().slice(0, 10);
      renderPlayers();
      renderOverall();
      renderPerGame();
      renderUsers();
      renderHistory();
      renderResultRows();
      if (!state.selectedGame && state.games.length > 0) state.selectedGame = state.games[state.games.length - 1].id;
    }

    function switchTab(t) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + t).classList.add('active');
      event.target.classList.add('active');
      if (t === 'pergame') renderPerGame();
      if (t === 'overall') renderOverall();
      if (t === 'users') renderUsers();
      if (t === 'players') renderHistory();
    }

    function addPlayer() {
      const inp = document.getElementById('new-player-input');
      const name = inp.value.trim();
      if (!name) return;
      if (state.players.find(p => p.name.toLowerCase() === name.toLowerCase())) { showToast('Player exists!'); return; }
      state.players.push({ id: Date.now() + '', name });
      inp.value = '';
      saveState();
      renderPlayers();
      renderResultRows();
      showToast(name + ' joined the table!');
    }

    function removePlayer(id) {
      state.players = state.players.filter(p => p.id !== id);
      saveState();
      renderPlayers();
      renderResultRows();
    }

    function renderPlayers() {
      const el = document.getElementById('players-list');
      if (!el) return;
      if (!state.players.length) { el.innerHTML = '<span style="font-size:13px;color:rgba(232,224,200,0.4)">No players yet</span>'; return; }
      el.innerHTML = state.players.map(p => `
      <div class="player-chip">
        ${p.name}
        <span class="remove" onclick="requireAuth('remove-player-${p.id}', 'Remove player?')">✕</span>
      </div>`).join('');
    }

    function renderResultRows() {
      const el = document.getElementById('result-rows');
      if (!el) return;
      if (!state.players.length) { el.innerHTML = '<div style="color:rgba(232,224,200,0.4);font-size:13px;padding:8px 0">Add players first in the Players tab.</div>'; return; }
      el.innerHTML = state.players.map(p => `
      <div class="form-row" style="align-items:center;margin-bottom:8px">
        <div class="field" style="flex:1.5;font-size:14px;padding-top:4px">${p.name}</div>
        <div class="field" style="flex:0.5">
          <label>Result</label>
          <select id="res-type-${p.id}" style="background:rgba(0,0,0,0.5);border:1px solid rgba(201,151,58,0.35);border-radius:6px;color:#e8e0c8;padding:8px 6px;font-size:14px;width:100%">
            <option value="skip">-</option>
            <option value="win">Win</option>
            <option value="loss">Loss</option>
          </select>
        </div>
        <div class="field" style="flex:0.8">
          <label>Amount</label>
          <input type="number" id="res-amt-${p.id}" placeholder="0" style="text-align:right" />
        </div>
      </div>`).join('');
    }

    function saveGame() {
      const name = document.getElementById('game-name-input').value.trim();
      const date = document.getElementById('game-date-input').value;
      if (!name) { showToast('Enter a game name!'); return; }
      const results = [];
      state.players.forEach(p => {
        const typeEl = document.getElementById('res-type-' + p.id);
        const amtEl = document.getElementById('res-amt-' + p.id);
        if (!typeEl) return;
        const type = typeEl.value;
        if (type === 'skip') return;
        const amt = parseFloat(amtEl.value) || 0;
        results.push({ playerId: p.id, playerName: p.name, type, amount: amt });
      });
      if (!results.length) { showToast('Add at least one result!'); return; }

      if (!isAuthenticated) {
        authPendingAction = 'add-game-confirmed';
        showAuthModal('Save game? Verify secret code.');
        return;
      }

      if (authPendingAction === 'add-game-confirmed') {
        authPendingAction = null;
        const gameId = String(state.games.length + 1);
        const game = { id: gameId, name, date, results };
        state.games.push(game);
        state.selectedGame = game.id;
        
        // Save the individual game file
        saveGameFile(game);
        
        // Update state
        saveState();
        document.getElementById('game-name-input').value = '';
        renderResultRows();
        renderOverall();
        renderPerGame();
        renderUsers();
        renderHistory();
        showToast('Game saved! Chips counted.');
        switchTabTo('overall');
      }
    }

    function switchTabTo(t) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + t).classList.add('active');
      document.querySelectorAll('.tab').forEach(b => { if (b.textContent.toLowerCase().includes(t === 'addgame' ? 'add' : t === 'pergame' ? 'per' : t)) b.classList.add('active'); });
    }

    function deleteGame(id) {
      state.games = state.games.filter(g => g.id !== id);
      if (state.selectedGame === id) state.selectedGame = state.games.length ? state.games[state.games.length - 1].id : null;
      saveState();
      renderOverall();
      renderPerGame();
      renderUsers();
      renderHistory();
      showToast('Game removed.');
    }

    function getOverallStats() {
      const stats = {};
      state.players.forEach(p => { stats[p.id] = { name: p.name, wins: 0, losses: 0, net: 0, games: 0 }; });
      state.games.forEach(g => {
        g.results.forEach(r => {
          if (!stats[r.playerId]) stats[r.playerId] = { name: r.playerName, wins: 0, losses: 0, net: 0, games: 0 };
          stats[r.playerId].games++;
          if (r.type === 'win') { stats[r.playerId].wins++; stats[r.playerId].net += r.amount; }
          else { stats[r.playerId].losses++; stats[r.playerId].net -= r.amount; }
        });
      });
      return Object.values(stats).filter(s => s.games > 0).sort((a, b) => b.net - a.net);
    }

    function renderOverall() {
      const el = document.getElementById('overall-lb');
      const se = document.getElementById('overall-stats');
      if (!el) return;
      const stats = getOverallStats();
      const totalGames = state.games.length;
      const totalPlayers = state.players.length;
      const bigWinner = stats.length ? stats[0].name : '-';
      if (se) se.innerHTML = `
      <div class="stat-box"><span class="stat-val">${totalGames}</span><span class="stat-label">Games</span></div>
      <div class="stat-box"><span class="stat-val">${totalPlayers}</span><span class="stat-label">Players</span></div>
      <div class="stat-box"><span class="stat-val" style="font-size:clamp(10px,2.5vw,14px)">${bigWinner}</span><span class="stat-label">Top Dog</span></div>`;
      if (!stats.length) { el.innerHTML = '<div class="empty"><div class="card-icon">🃏</div>No games yet.<br>Add your first game!</div>'; return; }
      el.innerHTML = `<table class="lb-table">
      <thead><tr>
        <th style="width:36px">#</th>
        <th>Player</th>
        <th>W/L</th>
        <th style="text-align:right">Net</th>
      </tr></thead>
      <tbody>${stats.map((s, i) => `
        <tr class="lb-row">
          <td><div class="rank-badge rank-${i < 3 ? i + 1 : 'other'}">${i + 1}</div></td>
          <td class="player-name">${s.name}</td>
          <td><span class="wins">▲${s.wins}</span> <span class="losses">▼${s.losses}</span></td>
          <td style="text-align:right" class="${s.net > 0 ? 'net-pos' : s.net < 0 ? 'net-neg' : 'net-zero'}">
            ${s.net > 0 ? '+' : ''}${s.net.toFixed(0)}
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
    }

    function renderUsers() {
      const grid = document.getElementById('users-grid');
      if (!grid) return;

      const stats = getOverallStats();
      const allPlayers = state.players.map(p => {
        const playerStats = stats.find(s => s.name === p.name);
        return {
          id: p.id,
          name: p.name,
          net: playerStats ? playerStats.net : 0,
          wins: playerStats ? playerStats.wins : 0,
          losses: playerStats ? playerStats.losses : 0,
          games: playerStats ? playerStats.games : 0
        };
      }).sort((a, b) => b.net - a.net);

      if (!allPlayers.length) {
        grid.innerHTML = '<div class="empty"><div class="card-icon">👥</div>No players yet.</div>';
        return;
      }

      grid.innerHTML = allPlayers.map((p, idx) => {
        const isWinner = p.net > 0;
        const icon = isWinner ? '🏆' : '♠️';
        return `
        <div class="user-card ${isWinner ? 'winner' : 'loser'}" onclick="createSparkles(event); showUserDetail('${p.id}', '${p.name}', ${p.net}, ${p.wins}, ${p.losses}, ${p.games})">
          <div class="user-chip-icon">${icon}</div>
          <div class="user-card-name">${p.name}</div>
          <div class="user-card-stats">
            <div class="user-card-stat-label">Net</div>
            <div class="user-card-stat-value ${isWinner ? 'net-pos' : 'net-neg'}">
              ${isWinner ? '+' : ''}${p.net.toFixed(1)}
            </div>
            <div style="margin-top:12px;border-top:1px solid rgba(201,151,58,0.3);padding-top:8px;font-size:11px;">
              <span class="wins">▲ ${p.wins}</span> | <span class="losses">▼ ${p.losses}</span>
            </div>
          </div>
        </div>
      `;
      }).join('');
    }

    function renderPerGame() {
      const sel = document.getElementById('game-selector');
      const lb = document.getElementById('pergame-lb');
      if (!sel || !lb) return;
      if (!state.games.length) { sel.innerHTML = ''; lb.innerHTML = '<div class="empty"><div class="card-icon">🎴</div>No games yet.</div>'; return; }
      sel.innerHTML = [...state.games].map(g => `
      <div class="game-pill ${state.selectedGame === g.id ? 'active' : ''}" onclick="selectGame('${g.id}')">${g.name}</div>`).join('');
      const game = state.games.find(g => g.id === state.selectedGame) || state.games[state.games.length - 1];
      if (!game) return;
      const sorted = [...game.results].sort((a, b) => {
        const av = a.type === 'win' ? a.amount : -a.amount;
        const bv = b.type === 'win' ? b.amount : -b.amount;
        return bv - av;
      });
      lb.innerHTML = `
      <div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-family:'Cinzel Decorative',cursive;font-size:12px;color:var(--gold2)">${game.name}</span>
        <span style="font-size:11px;color:rgba(232,224,200,0.4)">${game.date}</span>
      </div>
      <table class="lb-table">
        <thead><tr><th style="width:36px">#</th><th>Player</th><th>Result</th><th style="text-align:right">Amount</th></tr></thead>
        <tbody>${sorted.map((r, i) => `
          <tr class="lb-row">
            <td><div class="rank-badge rank-${i < 3 ? i + 1 : 'other'}">${i + 1}</div></td>
            <td class="player-name">${r.playerName}</td>
            <td>${r.type === 'win' ? '<span class="wins">▲ Win</span>' : '<span class="losses">▼ Loss</span>'}</td>
            <td style="text-align:right" class="${r.type === 'win' ? 'net-pos' : 'net-neg'}">${r.type === 'win' ? '+' : '-'}${r.amount.toFixed(0)}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    }

    function selectGame(id) {
      state.selectedGame = id;
      renderPerGame();
    }

    function renderHistory() {
      const el = document.getElementById('game-history');

      }).join('');
    }

    function createSparkles(event) {
      const x = event.clientX;
      const y = event.clientY;
      const sparkles = ['✨', '💫', '⭐', '🌟', '💎', '🎊'];

      for (let i = 0; i < 12; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];

        const angle = (Math.PI * 2 * i) / 12;
        const distance = 80 + Math.random() * 40;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;

        sparkle.style.left = x + 'px';
        sparkle.style.top = y + 'px';
        sparkle.style.setProperty('--tx', tx + 'px');
        sparkle.style.setProperty('--ty', ty + 'px');

        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1000);
      }
    }

    function showUserDetail(playerId, playerName, net, wins, losses, games) {
      const modal = document.getElementById('user-detail-overlay');
      document.getElementById('detail-user-name').textContent = playerName;
      document.getElementById('detail-net-value').textContent = (net > 0 ? '+' : '') + net.toFixed(1);
      document.getElementById('detail-net-value').style.color = net > 0 ? '#2ecc71' : net < 0 ? '#e74c3c' : 'var(--gold2)';
      document.getElementById('detail-games-value').textContent = games;
      document.getElementById('detail-wins-value').textContent = wins;
      document.getElementById('detail-losses-value').textContent = losses;

      const winRate = games > 0 ? Math.round((wins / games) * 100) : 0;
      document.getElementById('detail-winrate-value').textContent = winRate + '%';

      const avgPerGame = games > 0 ? (net / games).toFixed(1) : '0';
      document.getElementById('detail-avg-value').textContent = (avgPerGame > 0 ? '+' : '') + avgPerGame;
      document.getElementById('detail-avg-value').style.color = avgPerGame > 0 ? '#2ecc71' : avgPerGame < 0 ? '#e74c3c' : 'var(--gold2)';

      // Get player's game results
      const playerGames = [];
      state.games.forEach(game => {
        const result = game.results.find(r => r.playerName === playerName);
        if (result) {
          playerGames.push({
            gameName: game.name,
            date: game.date,
            type: result.type,
            amount: result.amount
          });
        }
      });

      const gamesList = document.getElementById('detail-games-list');
      if (playerGames.length === 0) {
        gamesList.innerHTML = '<div style="color:rgba(232,224,200,0.5);font-size:12px;padding:1rem;text-align:center">No games recorded yet</div>';
      } else {
        gamesList.innerHTML = playerGames.map(g => `
        <div class="game-item">
          <div class="game-item-name">${g.gameName} (${g.date})</div>
          <div class="game-item-result ${g.type === 'win' ? 'net-pos' : 'net-neg'}">
            ${g.type === 'win' ? '✓ +' : '✗ '}${g.amount.toFixed(1)}
          </div>
        </div>
      `).join('');
      }

      modal.classList.add('active');
      createSparkles({ clientX: window.innerWidth / 2, clientY: window.innerHeight / 2 });
    }

    function closeUserDetail() {
      document.getElementById('user-detail-overlay').classList.remove('active');
